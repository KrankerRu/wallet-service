spring:
  application:
    name: wallet-service

  datasource:
    url: jdbc:postgresql://localhost:5432/walletdb
    username: wallet_user
    password: wallet_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true
    drop-first: false

  sql:
    init:
      mode: never

server:
  port: 8080

logging:
  level:
    com.kranker.walletservice: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN
    liquibase: INFO